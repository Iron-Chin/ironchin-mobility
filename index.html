const { useState, useEffect, useRef } = React;

/* ════════════════════════════════════════════════════════════════════════
   PINNED DEMO VIDEOS — EDIT HERE
   One vetted clip per exercise, keyed by the exercise name exactly as it
   appears in TYPES below. To swap a clip, just paste a new YouTube URL.

  "Down-dog ↔ cobra flow":     "https://www.youtube.com/watch?v=zV-dAVrnZFY", // Down Dog to Cobra

/* ───────────────────────── icons (inline SVG, lucide paths) ─────────────── */

  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
    fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    style={style} {...rest}>{children}</svg>
);
const Flame = makeIcon(<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" />);
const Play = makeIcon(<polygon points="6 3 20 12 6 21 6 3" />);
const Pause = makeIcon(<><rect x="14" y="4" width="4" height="16" rx="1" /><rect x="6" y="4" width="4" height="16" rx="1" /></>);

const ChevronLeft = makeIcon(<path d="m15 18-6-6 6-6" />);
const ChevronRight = makeIcon(<path d="m9 18 6-6-6-6" />);
const Target = makeIcon(<><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></>);
const Grid3x3 = makeIcon(<><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M3 9h18" /><path d="M3 15h18" /><path d="M9 3v18" /><path d="M15 3v18" /></>);
const ClipboardCheck = makeIcon(<><rect width="8" height="4" x="8" y="2" rx="1" ry="1" /><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" /><path d="m9 14 2 2 4-4" /></>);
const BookOpen = makeIcon(<><path d="M12 7v14" /><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z" /></>);
const X = makeIcon(<><path d="M18 6 6 18" /><path d="m6 6 12 12" /></>);
const ExternalLink = makeIcon(<><path d="M15 3h6v6" /><path d="M10 14 21 3" /><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /></>);
const Circle = makeIcon(<circle cx="12" cy="12" r="10" />);
const Mic = makeIcon(<><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" x2="12" y1="19" y2="22" /></>);
const AngleIcon = makeIcon(<><path d="M3 20h18" /><path d="M3 20 18 5" /><path d="M11 20a8 8 0 0 0-2.3-5.7" /></>);
const Upload = makeIcon(<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" x2="12" y1="3" y2="15" /></>);
const Camera = makeIcon(<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z" /><circle cx="12" cy="13" r="3" /></>);

/* ───────────────────────── palette (inline; no Tailwind arbitrary values) ── */
const C = {
  bg0: "#15171C", bg1: "#1D2027", bg2: "#262A33", line: "#333845",
  ink: "#ECEAE4", ink2: "#9AA0AC",
  amber: "#E8772E", blue: "#5B8DB8", teal: "#36A18B", violet: "#9B7EDE", slate: "#7C8595",
  green: "#46E08A",
};

/* ───────────────────────── data ──────────────────────────────────────────── */
const FOCUS = {
  A: { label: "Hips", sub: "kicks · teep · checks · stance", color: C.amber },
  B: { label: "T-spine + shoulders", sub: "punch rotation · guard · clinch", color: C.blue },
  C: { label: "Hips + ankles", sub: "pivot · balance · kick mechanics", color: C.teal },
  D: { label: "Posterior + flow", sub: "hamstrings · toe-touch · stitch it together", color: C.violet },
};

const TYPES = {
  A: [
    { n: "Hip CARs", d: "3 slow circles each way · each hip", c: "Biggest circle you can control. Move from the hip socket — keep ribs down and spine still.", tag: "WARM-UP" },
    { n: "90/90 switches", d: "8–10 switches · then 20–30s hold/side", c: "Sit tall, both knees at 90°. Rotate toward your back hip. If your low back rounds, sit up on the block.", tag: "PRIORITY" },
    { n: "Cossack squat", d: "5 each side", c: "Heel down, chest up, sink into one hip; far leg straight with toes up. Only as deep as you can own." },
    { n: "Couch stretch", d: "30–45s each side", c: "Back shin up the wall or block. Squeeze the back glute and tuck the pelvis under — that's the stretch, not arching your back." },
  ],
  B: [
    { n: "Cat–cow", d: "8 slow rounds", c: "Move one vertebra at a time, synced to your breath.", tag: "WARM-UP" },
    { n: "Open book", d: "6–8 each side · 2–3s hold", c: "Knees stacked and pinned down. Follow your top hand with your eyes. Exhale as you open." },
    { n: "Thread the needle", d: "6 each side", c: "Reach the arm under and through, then unwind and open it toward the ceiling." },
    { n: "Band pass-throughs", d: "8–10 reps", c: "Straight arms, wide grip, slow. Stop short of any pinch. Narrow the grip over the weeks." },
  ],
  C: [
    { n: "Ankle CARs + leg swings", d: "5 each", c: "Trace slow ankle circles, then relaxed leg swings front-to-back and side-to-side.", tag: "WARM-UP" },
    { n: "Knee-to-wall", d: "8–10 each · note the cm", c: "Foot a few cm from wall, drive the knee over your toes to tap the wall, heel glued down. Track your distance." },
    { n: "Frog rock-backs", d: "8–10 · then 20–30s hold", c: "Knees wide, ankles in line with knees, flat back. Rock your hips back toward your heels." },
    { n: "Band straight-leg raise", d: "8–10 each · then 5s push/relax ×3", c: "Band round your foot, leg fairly straight, raise to a stretch — never pain. This is your toe-touch unlock.", tag: "TOE-TOUCH" },
  ],
  D: [
    { n: "World's greatest stretch", d: "4–5 each side", c: "Lunge, opposite elbow to instep, then rotate that arm to the sky. Hip, hamstring and t-spine in one move.", tag: "OPENER" },
    { n: "Down-dog ↔ cobra flow", d: "6–8 slow", c: "Push hips up and drive heels down for the calves and hamstrings; then glide forward and open the chest." },
    { n: "Toe-touch reset", d: "2 rounds", c: "Heels on block, hinge and reach down (5 breaths). Then toes on block, hinge and reach. Resets how your spine and hips share the bend.", tag: "TOE-TOUCH" },
    { n: "Standing fold (PNF)", d: "30s · then contract-relax", c: "Soft knees, hinge from the hips, let your head hang heavy. To progress: press feet into the floor 5s, relax, fold a touch deeper.", tag: "TOE-TOUCH" },
  ],
};

// 30 sessions, 5-cycle [A,B,C,A,D] → hips prioritised (12 of 30)
const SCHEDULE = Array.from({ length: 30 }, (_, i) => ["A", "B", "C", "A", "D"][i % 5]);

const PHASES = [
  { name: "Prime", range: [1, 8], color: C.slate, note: "Learn the shapes. Short holds (~20s), slow reps. Don't chase range yet — build the habit." },
  { name: "Lengthen", range: [9, 15], color: C.teal, note: "Longer end-range holds (30–45s). Add PNF: push into the stretch 5s, relax, sink deeper. Repeat ×2–3." },
  { name: "Load", range: [16, 23], color: C.amber, note: "Own the range. Add band tension at end-range + CARs. This is what turns range into usable kicking strength." },
  { name: "Flow", range: [24, 30], color: C.violet, note: "Stitch it together — smooth transitions. Session 30: retest against your day-1 numbers." },
];
const phaseOf = (s) => PHASES.find((p) => s >= p.range[0] && s <= p.range[1]);

const STORE_KEY = "ironchin-mobility:v1";

/* ───────────────────────── persistence (localStorage) ───────────────────── */
function loadState() {
  try { const r = localStorage.getItem(STORE_KEY); return r ? JSON.parse(r) : null; }
  catch { return null; }
}
function saveState(s) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch { /* runs without persistence */ }
}

/* ───────────────────────── hold timer ───────────────────────────────────── */
function Timer({ accent }) {
  const presets = [20, 30, 45];
  const [target, setTarget] = useState(30);
  const [left, setLeft] = useState(30);
  const [run, setRun] = useState(false);
  const ref = useRef(null);
  // ── countdown beeps (Web Audio) — last 4s tick, plus a final tone at 0 ──
  const audioRef = useRef(null);
  const ensureAudio = () => {                       // must run from a tap so iOS unlocks sound
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!audioRef.current && AC) audioRef.current = new AC();
      if (audioRef.current && audioRef.current.state === "suspended") audioRef.current.resume();
    } catch { /* no audio available */ }
  };
  const beep = (freq, dur) => {
    try {
      const ctx = audioRef.current; if (!ctx) return;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "sine"; o.frequency.value = freq;
      o.connect(g); g.connect(ctx.destination);
      const t = ctx.currentTime;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.3, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur + 0.02);
    } catch { /* ignore */ }
  };
  useEffect(() => {
    if (!run) return;
    ref.current = setInterval(() => setLeft((l) => {
      const next = l - 1;
      if (next <= 0) { clearInterval(ref.current); setRun(false); beep(880, 0.4); return 0; } // final tone
      if (next <= 4) beep(660, 0.12);                                                          // 4·3·2·1 ticks
      return next;
    }), 1000);
    return () => clearInterval(ref.current);
  }, [run]);
  // ── 4-second lead-in ("get into position") before the hold begins ───────
  const [prep, setPrep] = useState(null);   // null = no lead-in; else 4·3·2·1 countdown
  const [focus, setFocus] = useState(false); // full-screen focus mode (stays up while paused)
  const prepRef = useRef(null);
  const targetRef = useRef(target);
  const runRef = useRef(run);
  useEffect(() => { targetRef.current = target; }, [target]);
  useEffect(() => { runRef.current = run; }, [run]);
  const cancelPrep = () => { if (prepRef.current) { clearInterval(prepRef.current); prepRef.current = null; } setPrep(null); };
  const beginPrep = () => {
    if (runRef.current || prepRef.current) return;
    ensureAudio();
    setFocus(true);
    setLeft((l) => (l <= 0 ? targetRef.current : l));
    setPrep(4); beep(660, 0.12);                       // first "get ready" tick
    prepRef.current = setInterval(() => setPrep((p) => {
      if (p <= 1) { clearInterval(prepRef.current); prepRef.current = null; beep(880, 0.25); setRun(true); return null; } // GO → hold starts
      beep(660, 0.12); return p - 1;                   // 3 · 2 · 1 ticks
    }), 1000);
  };
  const onStop = () => { cancelPrep(); setRun(false); setFocus(false); setLeft(target); };   // exit focus mode
  const onHoldTap = () => { ensureAudio(); if (run) { setRun(false); return; } if (prep !== null) { onStop(); return; } beginPrep(); };

  const set = (t) => { cancelPrep(); setTarget(t); setLeft(t); setRun(false); };
  const reset = () => { cancelPrep(); setLeft(target); setRun(false); };

  // ── best-effort voice control (Web Speech API) ──────────────────────────
  // Reliable on desktop Chrome / Android; iOS Safari support is flaky, so this
  // fails silently and never blocks the manual buttons. Say "go" to start.
  const SR = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);
  const [listening, setListening] = useState(false);
  const recRef = useRef(null);
  const wantRef = useRef(false);      // do we intend to keep listening?
  const toggleVoice = () => {
    if (!SR) return;
    ensureAudio();
    if (listening) { wantRef.current = false; try { recRef.current && recRef.current.stop(); } catch {} setListening(false); return; }
    try {
      const rec = new SR();
      rec.lang = "en-US"; rec.continuous = true; rec.interimResults = true;
      rec.onresult = (ev) => {
        for (let i = ev.resultIndex; i < ev.results.length; i++) {
          const t = ev.results[i][0].transcript.toLowerCase();
          if (/\b(go|start|hold|begin)\b/.test(t)) beginPrep();
          else if (/\b(stop|pause)\b/.test(t)) { setRun(false); cancelPrep(); }
          else if (/\breset\b/.test(t)) reset();
        }
      };
      rec.onerror = () => { /* e.g. no-speech / not-allowed — keep quiet */ };
      rec.onend = () => { if (wantRef.current) { try { rec.start(); } catch {} } else setListening(false); };
      recRef.current = rec; wantRef.current = true; rec.start(); setListening(true);
    } catch { setListening(false); }
  };
  useEffect(() => () => { wantRef.current = false; try { recRef.current && recRef.current.stop(); } catch {} if (prepRef.current) clearInterval(prepRef.current); }, []);
  const inPrep = prep !== null;
  const busy = run || inPrep;                  // lead-in or running → show full-screen focus mode
  const frac = inPrep ? (4 - prep) / 4 : (target ? left / target : 0);   // lead-in: ring charges up 0→full
  const display = inPrep ? prep : left;
  const actionLabel = run ? "Pause" : inPrep ? "Ready…" : focus ? "Resume" : "Start";
  const renderRing = (px) => {
    const sw = px <= 100 ? 6 : 12, r = px / 2 - sw - 2, circ = 2 * Math.PI * r;
    return (
      <div style={{ position: "relative", width: px, height: px }}>
        <svg width={px} height={px} style={{ transform: "rotate(-90deg)" }}>
          <circle cx={px / 2} cy={px / 2} r={r} stroke={C.line} strokeWidth={sw} fill="none" />
          <circle cx={px / 2} cy={px / 2} r={r} stroke={accent} strokeWidth={sw} fill="none" strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={circ * (1 - frac)} style={{ transition: "stroke-dashoffset 1s linear" }} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Oswald, sans-serif", fontSize: px <= 100 ? 26 : Math.round(px * 0.34), color: inPrep ? accent : C.ink, animation: inPrep ? "icPrepPulse 1s ease-in-out infinite" : "none" }}>{display}</div>
      </div>
    );
  };
  const ringPx = Math.min(320, (typeof window !== "undefined" ? window.innerWidth : 380) - 72);
  return (
    <>
      {/* full-screen focus mode while the timer is active — only the ring + action button, blurred backdrop */}
      {focus && (
        <div style={{ position: "fixed", inset: 0, zIndex: 60, background: "rgba(21,23,28,0.8)", backdropFilter: "blur(16px)", WebkitBackdropFilter: "blur(16px)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", boxSizing: "border-box", padding: "calc(24px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom))" }}>
          {renderRing(ringPx)}
          <button onClick={onHoldTap} style={{ marginTop: 36, width: "100%", maxWidth: 300, display: "flex", alignItems: "center", justifyContent: "center", gap: 9, padding: "18px 0", borderRadius: 14, background: accent, color: "#15171C", border: "none", fontWeight: 700, fontSize: 18, cursor: "pointer", fontFamily: "Oswald, sans-serif", letterSpacing: 1, textTransform: "uppercase" }}>
            {busy ? <Pause size={20} /> : <Play size={20} />}{actionLabel}
          </button>
          {!busy && (
            <button onClick={onStop} style={{ marginTop: 12, width: "100%", maxWidth: 300, display: "flex", alignItems: "center", justifyContent: "center", gap: 9, padding: "15px 0", borderRadius: 14, background: C.bg2, color: C.ink, border: `1px solid ${C.line}`, cursor: "pointer", fontWeight: 700, fontSize: 16, fontFamily: "Oswald, sans-serif", letterSpacing: 1, textTransform: "uppercase" }}>
              <X size={18} /> Stop
            </button>
          )}
        </div>
      )}
    <div style={{ display: "flex", alignItems: "center", gap: 16, marginTop: 14 }}>
      {renderRing(84)}
      <div style={{ flex: 1 }}>
        <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
          {presets.map((p) => (
            <button key={p} onClick={() => set(p)} style={{ flex: 1, padding: "6px 0", borderRadius: 8, fontSize: 13, cursor: "pointer",
              background: target === p ? accent : C.bg2, color: target === p ? "#15171C" : C.ink2, border: `1px solid ${C.line}`, fontWeight: 600 }}>{p}s</button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onHoldTap} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "9px 0", borderRadius: 8, cursor: "pointer", background: accent, color: "#15171C", border: "none", fontWeight: 700, fontSize: 14 }}>
            {busy ? <Pause size={16} /> : <Play size={16} />}{actionLabel}
          </button>
          <button onClick={reset} aria-label="Reset timer" style={{ width: 42, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 8, cursor: "pointer", background: C.bg2, color: C.ink2, border: `1px solid ${C.line}` }}><RotateCcw size={16} /></button>
          {SR && (
            <button onClick={toggleVoice} aria-label={listening ? "Stop voice" : "Start by voice"} style={{ width: 42, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 8, cursor: "pointer", background: C.bg2, color: listening ? accent : C.ink2, border: `1px solid ${listening ? accent : C.line}` }}><Mic size={16} /></button>
          )}
        </div>
        {SR && listening && (
          <div style={{ fontSize: 11, color: accent, marginTop: 7, lineHeight: 1.35 }}>Listening — say "Go" to start, "Stop" to pause.</div>
        )}
      </div>
    </div>
    </>
  );
}

/* ───────────────────────── session player ───────────────────────────────── */
function Player({ session, onClose, onComplete, done }) {
  const type = SCHEDULE[session - 1];
  const ex = TYPES[type];
  const focus = FOCUS[type];
  const phase = phaseOf(session);
  const [i, setI] = useState(0);
  const e = ex[i];
  const last = i === ex.length - 1;
  const videoUrl = VIDEOS[e.n] || "https://www.youtube.com";
  const touch = useRef({ x: 0, y: 0 });
  const goPrev = () => setI((v) => Math.max(0, v - 1));
  const goNext = () => setI((v) => Math.min(ex.length - 1, v + 1));
  const onTouchStart = (ev) => { const t = ev.touches[0]; touch.current = { x: t.clientX, y: t.clientY }; };
  const onTouchEnd = (ev) => {
    const t = ev.changedTouches[0];
    const dx = t.clientX - touch.current.x, dy = t.clientY - touch.current.y;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4) { if (dx < 0) goNext(); else goPrev(); }
  };
  return (
    <div style={{ position: "fixed", inset: 0, background: C.bg0, zIndex: 50, display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto" }}>
      <div style={{ padding: "calc(14px + env(safe-area-inset-top)) 18px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: `1px solid ${C.line}` }}>
        <div>

const TEST_FIELDS = [
  { k: "squat", label: "Deep squat", hint: "heels down? chest up? note quality" },

  { k: "reach", label: "Overhead reach", hint: "arms by ears against wall? note gap" },
];
const fmtDate = (d) => { try { return new Date(d).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" }); } catch { return d; } };

/* A single photo with grid overlay + 3-point angle measurement. */
function PhotoPanel({ img, pts, date, onImg, onPts, onDate }) {
  const [grid, setGrid] = useState(false);
  const [size, setSize] = useState({ w: 0, h: 0 });
  const wrapRef = useRef(null);
  const fileRef = useRef(null);

  const measure = () => { const el = wrapRef.current; if (el) setSize({ w: el.clientWidth, h: el.clientHeight }); };
  useEffect(() => { measure(); window.addEventListener("resize", measure); return () => window.removeEventListener("resize", measure); }, [img]);

  const pickFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const im = new Image();
      im.onload = () => {
        const maxW = 1000;
        const scale = Math.min(1, maxW / im.width);
        const cw = Math.round(im.width * scale), ch = Math.round(im.height * scale);
        const cv = document.createElement("canvas"); cv.width = cw; cv.height = ch;
        let out;
        try { cv.getContext("2d").drawImage(im, 0, 0, cw, ch); out = cv.toDataURL("image/jpeg", 0.7); }
        catch { out = reader.result; }
        onImg(out); onPts([]); onDate(new Date().toISOString());
      };
      im.onerror = () => { onImg(reader.result); onPts([]); onDate(new Date().toISOString()); };
      im.src = reader.result;
    };
    reader.readAsDataURL(file);
  };

  const addPoint = (e) => {
    if (!img || (pts || []).length >= 3) return;
    const el = wrapRef.current; if (!el) return;
    const rect = el.getBoundingClientRect();
    const fx = (e.clientX - rect.left) / rect.width;
    const fy = (e.clientY - rect.top) / rect.height;
    onPts([...(pts || []), { x: Math.max(0, Math.min(1, fx)), y: Math.max(0, Math.min(1, fy)) }]);
  };

  const p = pts || [];
  const px = (pt) => ({ x: pt.x * size.w, y: pt.y * size.h });
  let angle = null;
  if (p.length === 3 && size.w && size.h) {
    const a = px(p[0]), b = px(p[1]), c = px(p[2]);
    const v1x = a.x - b.x, v1y = a.y - b.y, v2x = c.x - b.x, v2y = c.y - b.y;
    const m1 = Math.hypot(v1x, v1y), m2 = Math.hypot(v2x, v2y);
    if (m1 && m2) angle = Math.round(Math.acos(Math.max(-1, Math.min(1, (v1x * v2x + v1y * v2y) / (m1 * m2)))) * 180 / Math.PI);
  }

  const btn = (Icon, label, onClick, on) => (
    <button onClick={onClick} aria-label={label} title={label}
      style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "9px 0", borderRadius: 8,
        background: on ? C.green : C.bg2, color: on ? "#10231A" : C.ink, border: `1px solid ${on ? C.green : C.line}`, cursor: "pointer" }}>
      <Icon size={18} />
    </button>
  );

  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div ref={wrapRef} onClick={addPoint}
        style={{ position: "relative", width: "100%", aspectRatio: "3 / 4", background: C.bg2, border: `1px solid ${C.line}`,
          borderRadius: 8, overflow: "hidden", cursor: img ? "crosshair" : "pointer" }}>
        {img ? (
          <img src={img} alt="" style={{ width: "100%", height: "100%", objectFit: "contain", display: "block", pointerEvents: "none" }} />
        ) : (
          <button onClick={() => fileRef.current && fileRef.current.click()}
            style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              gap: 6, background: "transparent", border: "none", color: C.ink2, cursor: "pointer", fontSize: 12 }}>
            <Camera size={26} /><span>Add photo</span>
          </button>
        )}

        {img && grid && size.w > 0 && (
          <svg width="100%" height="100%" viewBox={`0 0 ${size.w} ${size.h}`} preserveAspectRatio="none"
            style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
            {[1, 2, 3, 4, 5, 6, 7].map((i) => (
              <line key={"v" + i} x1={(size.w * i) / 8} y1="0" x2={(size.w * i) / 8} y2={size.h} stroke="rgba(255,255,255,0.35)" strokeWidth="1" />
            ))}
            {[1, 2, 3, 4, 5, 6, 7].map((i) => (
              <line key={"h" + i} x1="0" y1={(size.h * i) / 8} x2={size.w} y2={(size.h * i) / 8} stroke="rgba(255,255,255,0.35)" strokeWidth="1" />
            ))}
          </svg>
        )}

        {img && p.length > 0 && size.w > 0 && (
          <svg width="100%" height="100%" viewBox={`0 0 ${size.w} ${size.h}`} preserveAspectRatio="none"
            style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
            {p.length >= 2 && <line x1={px(p[0]).x} y1={px(p[0]).y} x2={px(p[1]).x} y2={px(p[1]).y} stroke={C.green} strokeWidth="3" />}
            {p.length >= 3 && <line x1={px(p[1]).x} y1={px(p[1]).y} x2={px(p[2]).x} y2={px(p[2]).y} stroke={C.green} strokeWidth="3" />}
            {p.map((pt, i) => { const q = px(pt); return <circle key={i} cx={q.x} cy={q.y} r="6" fill={C.green} stroke="#10231A" strokeWidth="2" />; })}
          </svg>
        )}

        {angle != null && (
          <div style={{ position: "absolute", top: 6, left: 6, background: "rgba(16,35,26,0.82)", color: C.green,
            fontFamily: "Oswald, sans-serif", fontWeight: 700, fontSize: 30, lineHeight: 1, padding: "5px 9px", borderRadius: 8 }}>
            {angle}°
          </div>
        )}
        {img && p.length > 0 && p.length < 3 && (
          <div style={{ position: "absolute", bottom: 6, left: 6, right: 6, textAlign: "center", color: C.green, fontSize: 11 }}>
            Tap to place point {p.length + 1} of 3
          </div>
        )}
      </div>

      {img && date && (
        <div style={{ textAlign: "center", color: C.ink2, fontSize: 11, letterSpacing: 0.4, marginTop: 5 }}>
          {fmtDate(date)}
        </div>
      )}

      <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
        {btn(Grid3x3, "Toggle grid overlay", () => setGrid((g) => !g), grid)}
        {btn(AngleIcon, "Reset angle points", () => onPts([]), false)}
        {btn(Upload, "Upload a new photo", () => fileRef.current && fileRef.current.click(), false)}
      </div>
      <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }}
        onChange={(ev) => { const f = ev.target.files && ev.target.files[0]; if (f) pickFile(f); ev.target.value = ""; }} />
    </div>
  );
}

          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontFamily: "Oswald, sans-serif", fontSize: 22, color: C.amber, lineHeight: 1 }}>{completed.length}<span style={{ color: C.ink2, fontSize: 14 }}>/30</span></div>
            <div style={{ fontSize: 10, color: C.ink2, textTransform: "uppercase", letterSpacing: 1 }}>forged</div>
          </div>
        </div>

        {/* progress bar */}
        <div style={{ height: 6, background: C.bg2, borderRadius: 3, overflow: "hidden", marginBottom: 18 }}>
          <div style={{ height: "100%", width: `${(completed.length / 30) * 100}%`, background: `linear-gradient(90deg, ${C.amber}, ${C.violet})`, transition: "width .5s ease" }} />
        </div>

        {tab === "today" && (
          <div style={{ paddingBottom: 90 }}>
            <div style={{ fontSize: 12, textTransform: "uppercase", letterSpacing: 1.5, color: phase.color, marginBottom: 8 }}>{phase.name} phase · session {String(nextUp).padStart(2, "0")} of 30</div>
            <div style={{ background: C.bg1, border: `1px solid ${C.line}`, borderTop: `3px solid ${focus.color}`, borderRadius: 14, padding: 18, marginBottom: 14 }}>
              <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
                <h1 style={{ fontFamily: "Oswald, sans-serif", fontSize: 30, margin: 0, letterSpacing: 0.5, color: focus.color, textTransform: "uppercase" }}>{focus.label}</h1>
                {nextUp === 1 && <span style={{ fontSize: 11, color: C.amber, border: `1px solid ${C.amber}`, borderRadius: 4, padding: "2px 7px" }}>TEST DAY</span>}
                {nextUp === 30 && <span style={{ fontSize: 11, color: C.violet, border: `1px solid ${C.violet}`, borderRadius: 4, padding: "2px 7px" }}>RETEST</span>}
              </div>
              <div style={{ color: C.ink2, fontSize: 13, marginBottom: 12 }}>{focus.sub}</div>
              <div style={{ fontSize: 12.5, color: C.ink2, lineHeight: 1.5, marginBottom: 14, paddingBottom: 14, borderBottom: `1px solid ${C.line}` }}>
                <span style={{ color: phase.color, fontWeight: 600 }}>This phase: </span>{phase.note}
              </div>
              {TYPES[SCHEDULE[nextUp - 1]].map((e, k) => (
                <div key={k} style={{ display: "flex", gap: 11, padding: "7px 0" }}>
                  <Circle size={7} fill={focus.color} color={focus.color} style={{ marginTop: 6, flexShrink: 0 }} />
                  <div>
                    <div style={{ fontSize: 14.5, color: C.ink, fontWeight: 600 }}>{e.n} {e.tag && <span style={{ fontSize: 10, color: focus.color, letterSpacing: 0.5 }}>· {e.tag}</span>}</div>
                    <div style={{ fontSize: 12.5, color: C.ink2 }}>{e.d}</div>
                  </div>
                </div>
              ))}
              <button onClick={() => openSession(nextUp)} style={{ width: "100%", marginTop: 14, padding: "13px 0", borderRadius: 11, background: focus.color, color: "#15171C", border: "none", fontWeight: 700, fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, fontFamily: "Oswald, sans-serif", letterSpacing: 1, textTransform: "uppercase" }}>
                <Play size={18} /> {completed.includes(nextUp) ? "Repeat session" : "Start session"}
              </button>
            </div>
            {completed.length === 30 && (
              <div style={{ background: C.bg1, border: `1px solid ${C.amber}`, borderRadius: 12, padding: 16, textAlign: "center" }}>
                <div style={{ fontFamily: "Oswald, sans-serif", fontSize: 20, color: C.amber, textTransform: "uppercase" }}>30 forged ✓</div>
                <div style={{ fontSize: 13, color: C.ink2, marginTop: 4 }}>Log your retest, compare to day one, then keep your favourite sessions on rotation.</div>
              </div>
            )}
          </div>
        )}

        {tab === "map" && <PlanMap completed={completed} current={nextUp} onPick={openSession} />}
        {tab === "test" && <Tests tests={tests} setTests={setTests} />}
        {tab === "guide" && <Guide onExport={exportData} onImport={importData} />}
      </div>

      {/* bottom nav */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: C.bg1, borderTop: `1px solid ${C.line}`, zIndex: 30, paddingBottom: "env(safe-area-inset-bottom)" }}>
        <div style={{ maxWidth: 480, margin: "0 auto", display: "flex" }}>
          {TABS.map((t) => {
            const I = t.icon, on = tab === t.k;
            return (
              <button key={t.k} onClick={() => setTab(t.k)} style={{ flex: 1, background: "none", border: "none", padding: "10px 0 13px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, color: on ? C.amber : C.ink2 }}>
                <I size={20} /><span style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: 0.3 }}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>

      {player && <Player session={player} done={completed.includes(player)} onClose={() => setPlayer(null)} onComplete={complete} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- offline support: register the service worker (no-op if unsupported) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () { /* offline still fine after first load */ });
      });
    }
  </script>
</body>
</html>
